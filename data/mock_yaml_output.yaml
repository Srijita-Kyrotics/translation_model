natural_text: 'F. M. A.-739 of 2019, সিদ্ধান্ত নিয়েছে 20/12/2022

  ভারতের সংবিধান, Art.226-চুক্তিভিত্তিক সেবা-আবেদনকারীর নবায়ন চুক্তির ভিত্তিতে শিখা
  শাহায়িকা হিসেবে নিযুক্ত ছিলেন না হওয়া-তার সেবা চুক্তি সময়ের অপপ্রবাহের মাধ্যমে
  শেষ হয় এবং অকাল সমাপ্তির মাধ্যমে নয়-চুক্তির মেয়াদ শেষ হলে ব্যবস্থাপনা তার সেবা
  চুক্তি নবায়ন না করার সিদ্ধান্ত নেয় যেহেতু ব্যবস্থাপনা তার সেবা সন্তোষজনক বলে মনে
  করেনি-ব্যবস্থাপনা পুরোপুরি তার অধিকারের মধ্যে ছিল-সেবা চুক্তি নবায়নের চুক্তির শর্তাবলীর
  অধীনে বা অন্যথায় সেবা চুক্তি নবায়ন না করার সিদ্ধান্ত নেওয়ার আগে কোনো শুনানির
  সুযোগ দেওয়ার প্রয়োজন ছিল না দেওয়ার আগে ব্যবস্থাপনা কমিটির ক্ষমতাপ্রাপ্ত ছিল-ব্যবস্থাপনা
  কমিটির ক্ষমতাপ্রাপ্ত এবং আবেদনকারীর কর্মক্ষমতা ছিল আবেদনকারীর কর্মক্ষমতা মূল্যায়ন
  করার ক্ষমতাপ্রাপ্ত এবং সন্তুষ্ট না হলে তার সেবা চুক্তি নবায়ন করতে অস্বীকার করতে
  পারে না হলে তার সেবা চুক্তি নবায়নের চুক্তি নবায়ন করতে অস্বীকার করতে পারে-এমন কোনো
  কিছুই উপস্থাপন করা হয়নি যাতে দেখা যায় না হয় না হয় যে আবেদনকারী ভুক্তভোগী হয়েছে
  বা অন্য কোনো কর্মচারীকে অযথা অযৌক্তিক অনুগ্রহ দেখানো হয়েছে-এটিও প্রদর্শিত হয়নি
  যে ব্যবস্থাপনা কমিটির সিদ্ধান্ত স্বে বা অন্য কর্মচারীকে অযৌক্তিক পক্ষপাতিত্ব দেখানো
  হয়-এটিও প্রদর্শিত হয়নি যে আবেদনকারী কমিটির সিদ্ধান্ত স্বে দেখানো হয়েছে বা অন্য
  কর্মচারীকে অযৌক্তিক বা অসৎ-সেবা চুক্তি নবায়ন করা হয়নি-সেবা চুক্তি নবায়নকে অবৈধ
  বলে প্রমাণিত হয়নি-সেবা চুক্তি নবায়ন না করার সিদ্ধান্তকে অবৈধ বলা যায় না করা অবৈধ
  বলা যায় না হয়।

  2008 এর W. P. 6294 (W), D/- 9.08.2018 (Cal)-কনফার্মড (প্যারা 18,19,20,21)

  কেস রেফার্ডঃ

  কালানুক্রমিক প্যারাস

  2008 এর W. P. 6294 (W), D/- 09-08-2018 প্যারা নং (1,8)

  এআইআর 1980 এসসি 42 প্যারা নং (12)

  এআইআর 1978 এসসি 597 প্যারা নং (12)

  আইনজীবীদের নাম

  সরদার আমজাদ আলী, লি. সিনিয়র এড. সামিরুল সরদার, মাসুম আলী সরদার, মো. আব্দুল আলীম,
  মিসেস সুচরিতা রায় পিটিশনারের পক্ষে; রেজাউল হোসেন উত্তরদাতার পক্ষে।'
