<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhasantar</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700&family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <h1>Bhasantar <span class="bengali-title">(ভাসান্তর)</span></h1>
                <p>Advanced English to Bengali Legal Translation Space</p>
            </div>
        </header>

        <main class="translation-workspace">
            <!-- English Input Container -->
            <div class="panel input-panel">
                <div class="panel-header">
                    <h2>English (Source)</h2>
                    <button class="clear-btn" id="clearBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    </button>
                </div>
                <textarea id="sourceText" placeholder="Enter English text here... (e.g. The defendant was found guilty of all charges.)"></textarea>
            </div>

            <!-- Translation Control Area (Middle) -->
            <div class="control-area">
                <button id="translateBtn" class="translate-btn">
                    <span class="btn-text">Translate</span>
                    <svg class="btn-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                    <div class="spinner" id="spinner"></div>
                </button>
            </div>

            <!-- Bengali Output Container -->
            <div class="panel output-panel">
                <div class="panel-header">
                    <h2>Bengali (Target)</h2>
                    <button class="copy-btn" id="copyBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>
                </div>
                <textarea id="targetText" readonly placeholder="Translation will appear here..."></textarea>
            </div>
        </main>
        
        <footer>
            <p>Powered by fine-tuned IndicTrans2 1B Model</p>
        </footer>
    </div>

    <!-- Script connection -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
